name: jbl_pills_reminder_app
description: "jbl pills reminder app"
publish_to: 'none'

version: 1.1.15+23

environment:
  sdk: ^3.6.1

dependencies:
  app_settings: ^7.0.0
  clipboard: ^3.0.14
  device_info_plus: ^13.1.0
  dio: ^5.8.0+1
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  flutter_local_notifications: ^21.0.0
  fluentui_system_icons: ^1.1.273
  flutter:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.5
  fluttertoast: ^9.0.0
  gap: ^3.0.1
  google_fonts: ^8.0.2
  http: ^1.3.0
  http_status_code: ^0.0.2
  icons_launcher: ^3.0.1
  intl: ^0.20.2
  package_info_plus: ^10.1.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.0+1
  searchfield: ^2.0.0
  shared_preferences: ^2.5.3
  smooth_page_indicator: ^2.0.1
  table_calendar: ^3.2.0
  toastification: ^3.0.1
  dartx: ^1.2.0
  connectivity_plus: ^7.0.0
  sqflite: ^2.4.2
  path: ^1.9.1
  go_router: ^17.2.1
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  get_it: ^9.2.1
  pinput: ^6.0.2


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true


  assets:
    - assets/
    - assets/img/
    - assets/resources/
    - assets/sound/


flutter_native_splash:
  color: "#ffffff"
  color_dark: "#ffffff"
  image: assets/app_logo.jpeg
  android_12:
    image: assets/app_logo.jpeg
    icon_background_color:

icons_launcher:
  image_path: "assets/app_logo.jpeg"
  platforms:
    android:
      enable: true
    ios:
      enable: true
